name: Bug report
description: Report incorrect behavior in the Pith engine or integrations
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Provide input text, options, and observed output when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. @pith/core 1.0.0, Node 20
