name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g. 2.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Validate release input
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid semantic version: ${{ github.event.inputs.version }}"
            exit 1
          fi
      - name: Test workspace
        run: cargo test --workspace
      - name: Run adapter benchmark gate
        run: cargo run -p pith -- feedback eval --input feedback/adapter-balanced-v1.jsonl
      - name: Build release
        run: cargo build --release --workspace
      - name: Update workspace version
        run: |
          perl -0777 -i -pe 's/(\[workspace\.package\]\nversion = ")([^"]+)(")/$1${{ github.event.inputs.version }}$3/s' Cargo.toml
      - name: Update lockfile metadata
        run: cargo metadata >/dev/null
      - name: Commit, tag and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${{ github.event.inputs.version }}"
          git tag v${{ github.event.inputs.version }}
          git push origin HEAD
          git push origin v${{ github.event.inputs.version }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "pith v${{ github.event.inputs.version }}"
          files: |
            target/release/pith
          generate_release_notes: true
