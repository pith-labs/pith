name: Release Core

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for pith-core (e.g. 2.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Update core crate version
        run: |
          sed -i 's/^version\.workspace = true$/version = "${{ github.event.inputs.version }}"/' crates/pith-core/Cargo.toml
      - name: Commit and tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add crates/pith-core/Cargo.toml
          git commit -m "release(core): v${{ github.event.inputs.version }}"
          git tag core-v${{ github.event.inputs.version }}
          git push origin HEAD
          git push origin core-v${{ github.event.inputs.version }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: core-v${{ github.event.inputs.version }}
          name: "pith-core v${{ github.event.inputs.version }}"
          generate_release_notes: true
