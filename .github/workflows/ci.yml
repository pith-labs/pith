name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core-and-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @pith/core test
      - run: npx tsx packages/core/src/semantic.gate.test.ts
      - run: npm run -w @pith/core benchmark
      - run: npm run -w @pith/cli build
