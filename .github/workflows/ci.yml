name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  core-and-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run -w @pith/core test
      - run: npm run -w @pith/core benchmark
      - run: npm run -w @pith/cli build
