services:
  - type: web
    name: pith-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace=packages/api
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
